<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta    name="theme-color"              content="#ffffff">
  <meta    name="viewport"                 content="width=device-width, initial-scale=1.0">
  <meta    name="google-site-verification" content="JHIhSJXzTWjiLvKi39hmhzdmLGLjc_2NpUtVe3mS7yc" />

  <link rel="apple-touch-icon"                      href="images/pngs/favicons/favicon_180.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="images/pngs/favicons/favicon_32.png">
  <link rel="icon" type="image/png" sizes="64x64"   href="images/pngs/favicons/favicon_64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/pngs/favicons/favicon_192.png">

  <style>
    html, body {

      margin:   0;
      padding:  0;

      overflow: hidden;
    
    }
  </style>
  <link rel="stylesheet" href="styles/calculator.css">

  <title>CALC | The Definitive Calculator</title>

</head>
<body>

  <main  class="conteudo">
    <div id="calculator">

      <div      id="screen"><h1>CALC | The Definitive Calculator</h1></div>
      <div      id="buttons">
        <div class="buttons" id="b0"><p>0</p></div>
        <div class="buttons" id="b1"><p>1</p></div>
        <div class="buttons" id="b2"><p>2</p></div>
        <div class="buttons" id="b3"><p>3</p></div>
        <div class="buttons" id="b4"><p>4</p></div>
        <div class="buttons" id="b5"><p>5</p></div>
        <div class="buttons" id="b6"><p>6</p></div>
        <div class="buttons" id="b7"><p>7</p></div>
        <div class="buttons" id="b8"><p>8</p></div>
        <div class="buttons" id="b9"><p>9</p></div>
        <div class="buttons" id="bPl"><p>+</p></div>
        <div class="buttons" id="bMi"><p>-</p></div>
        <div class="buttons" id="bDv"><p>/</p></div>
        <div class="buttons" id="bMl"><p>x</p></div>
        <div class="buttons" id="bMenu"><p>Mn</p></div>
      </div>

    </div>
  </main>

  <script src="scripts/script.js"></script>

</body>
</html>
