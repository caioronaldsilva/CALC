<!DOCTYPE html>
<html lang="en-US">
<head>

  <meta charset="UTF-8">
  <meta name="theme-color"              content="black">
  <meta name="viewport"                 content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="JHIhSJXzTWjiLvKi39hmhzdmLGLjc_2NpUtVe3mS7yc" />

  <link rel="apple-touch-icon"                      href="images/favicons/180x180.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="images/favicons/32x32.png">
  <link rel="icon" type="image/png" sizes="64x64"   href="images/favicons/64x64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicons/192x192.png">

  <meta name="description" content="CALC is a free calculator. Simple, fast and easy to use.">
  <meta name="robots"      content="index, follow">
  <link rel="canonical"    href="https://calc.lat/">

  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://calc.lat/">
  <meta property="og:title"       content="CALC | Digital Calculator">
  <meta property="og:description" content="CALC is a free calculator. Simple, fast and easy to use.">
  <meta property="og:image"       content="https://calc.lat/images/favicons/512x512.png">

  <meta name="twitter:card"        content="summary">
  <meta name="twitter:url"         content="https://calc.lat/">
  <meta name="twitter:title"       content="CALC | Digital Calculator">
  <meta name="twitter:description" content="CALC is a free calculator. Simple, fast and easy to use.">
  <meta name="twitter:image"       content="https://calc.lat/images/favicons/512x512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

  <style>

    * {

      box-sizing: border-box;

    }


    html, body {

      width:    100%;
      height:   100%;

      margin:   0;
      padding:  0;

      overflow: hidden;

      background-color: var(--bg);
      color:            var(--text);

      font-family: "Google Sans", sans-serif;
    
    }

  </style>

  <link rel="manifest"   href="manifest.json" />

  <link rel="stylesheet" href="css/popups.css">
  <link rel="stylesheet" href="css/calculator.css">
  <link rel="stylesheet" href="css/colorSchemes.css">

  <title>CALC | Digital Calculator</title>

  <script>

    window.addEventListener('DOMContentLoaded', () => {

      const bodyFirstLoad        = document.getElementById('body');
      const themeColorFirstLoad  = document.querySelector('meta[name="theme-color"]');

      if (localStorage.getItem('themeChoosed') === 'white') {
        bodyFirstLoad.style.filter = 'invert(100%)';
        themeColorFirstLoad.setAttribute('content', 'white');
      }
      
      else if (localStorage.getItem('themeChoosed') === 'black') {
        bodyFirstLoad.style.filter = '';
        themeColorFirstLoad.setAttribute('content', 'black');
      }

    });

  </script>

</head>

<header>

  <h1>CALC | Digital Calculator</h1>
  <button class="menuBtn"><img src="images/buttons/burguer.svg"></button>

</header>

<body id="body">
  <main         class="content">

    <div        id="calculator">

      <div      id="screen"><p></p></div>

      <div      id="buttons">
        <button class="buttons" id="aC">AC</button>
        <button class="buttons" id="pC">%</button>
        <button class="buttons" id="aS">()</button>
        <button class="buttons">/</button>
        <button class="buttons">7</button>
        <button class="buttons">8</button>
        <button class="buttons">9</button>
        <button class="buttons">x</button>
        <button class="buttons">4</button>
        <button class="buttons">5</button>
        <button class="buttons">6</button>
        <button class="buttons">-</button>
        <button class="buttons">1</button>
        <button class="buttons">2</button>
        <button class="buttons">3</button>
        <button class="buttons">+</button>
        <button class="buttons">0</button>
        <button class="buttons">.</button>
        <button class="buttons" id="c">C</button>
        <button class="buttons" id="bEq">=</button>
    </div>

  </main>

  <div class="popup" id="mainPopup">
    
    <div class="popup-header">

      <div class="popup-header-title">
        <h2>Menu</h2>
      </div>

    </div>

    <div class="popup-content">
      <button id="themeBtn">Change Colors</button>
    </div>

  </div>

  <div class="colorSchemes" id="popup">

    <div class="popup-header">
      <h2>Color Schemes</h2>
    </div>

    <div class="popup-content">
      
      <div class="colorCard">
        <div class="color" style="background-color: #FFFFFF;"></div>
        <h3>White</h3>
      </div>
      
      <div class="colorCard">
        <div class="color" style="background-color: #000000;"></div>
        <h3>Black</h3>
      </div>
      
      <div class="colorCard">
        <div class="color" style="background-color: #ADD8E6;"></div>
        <h3>Light-Blue</h3>
      </div>
      
      <div class="colorCard">
        <div class="color" style="background-color: #90EE90;"></div>
        <h3>Light-Green</h3>
      </div>
      
      <div class="colorCard">
        <div class="color" style="background-color: #FFB6C1;"></div>
        <h3>Light-Pink</h3>
      </div>
      
      <div class="colorCard">
        <div class="color" style="background-color: #CBC3E3;"></div>
        <h3>Light-Purple</h3>
      </div>
      
    </div>

  </div>

  <script src="javascript/colorSchemes.js"></script>
  <script src="javascript/basicArithmetic.js"></script>
  <script src="javascript/buttonsCommands.js"></script>
  <script src="javascript/navigationMenus.js"></script>
  
  <script>

    if ('serviceWorker' in navigator) {
      
      const promise = navigator.serviceWorker.register('serviceWorker.js');

      promise.then((registration) => {
        console.log('Service Worker registered:', registration);
      });

      promise.catch((error) => {
        console.log('Service Worker error:', error);
      });
    
    };

  </script>

</body>
</html>
