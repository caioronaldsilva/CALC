<!DOCTYPE html>
<html lang="en-US">
<head>

  <meta charset="UTF-8">
  <meta name="theme-color"              content="#ffffff">
  <meta name="viewport"                 content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="JHIhSJXzTWjiLvKi39hmhzdmLGLjc_2NpUtVe3mS7yc" />

  <link rel="apple-touch-icon"                      href="images/pngs/favicons/favicon_180.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="images/pngs/favicons/favicon_32.png">
  <link rel="icon" type="image/png" sizes="64x64"   href="images/pngs/favicons/favicon_64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/pngs/favicons/favicon_192.png">

  <style>

    * {
      box-sizing:       border-box;
    }


    html, body {

      width:            100%;
      height:           100%;

      margin:           0;
      padding:          0;

      overflow:         hidden;
    
    }

    header {

      height:           5%;
      width:            100%;

      margin:           0;
      padding:          0;
      top:              0;
      left:             0;

      position:         absolute;
      z-index:          1;

      color:            white;

      font-size:        1vh;
      text-align:       center;

    }

  </style>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles/calculator.css">

  <title>CALC | The Definitive Calculator</title>

</head>
<body>

  <header>
    <h1>CALC | The Definitive Calculator</h1>
  </header>

  <main         class="conteudo">
    <div        id="calculator">

      <div      id="screen"><p></p></div>
      <div      id="buttons">

        <div    id="numbers">
          <button class="buttons">8</button>
          <button class="buttons">9</button>
          <button class="buttons">6</button>
          <button class="buttons">7</button>
          <button class="buttons">4</button>
          <button class="buttons">5</button>
          <button class="buttons">2</button>
          <button class="buttons">3</button>
          <button class="buttons">0</button>
          <button class="buttons">1</button>
        </div>
        <div    id="operators">
          <button class="buttons">/</button>
          <button class="buttons">*</button>
          <button class="buttons">-</button>
          <button class="buttons">+</button>
          <button class="buttons">.</button>
          <button class="buttons" id="bEq">=</button>
          <button class="buttons" id="AC">AC</button>
      </div>

    </div>
  </main>

  <script       src="scripts/arithmetic.js"></script>

</body>
</html>
