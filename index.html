<!DOCTYPE html>
<html lang="en-US">
<head>

  <meta charset="UTF-8">
  <meta name="theme-color"              content="black">
  <meta name="viewport"                 content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="JHIhSJXzTWjiLvKi39hmhzdmLGLjc_2NpUtVe3mS7yc" />

  <link rel="apple-touch-icon"                      href="images/favicons/180x180.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="images/favicons/32x32.png">
  <link rel="icon" type="image/png" sizes="64x64"   href="images/favicons/64x64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicons/192x192.png">

  <style>

    * {

      box-sizing: border-box;

    }


    html, body {

      width:    100%;
      height:   100%;

      margin:   0;
      padding:  0;

      overflow: hidden;
    
    }

  </style>

  <link rel="manifest"   href="manifest.json" />
  <link rel="stylesheet" href="styles/popups.css">
  <link rel="stylesheet" href="styles/calculator.css">

  <title>CALC</title>

  <script>

    window.addEventListener('DOMContentLoaded', () => {

      const bodyFirstLoad        = document.getElementById('body');
      const themeColorFirstLoad  = document.querySelector('meta[name="theme-color"]');

      if (localStorage.getItem('themeChoosed') === 'white') {

        bodyFirstLoad.style.filter = 'invert(100%)';
        themeColorFirstLoad.setAttribute('content', 'white');

      } else if (localStorage.getItem('themeChoosed') === 'black') {

        bodyFirstLoad.style.filter = '';
        themeColorFirstLoad.setAttribute('content', 'black');

      }

    });

  </script>

</head>
<header>

  <h1>CALC | Web Calculator</h1>
  <button class="menuBtn"><img src="images/buttons/burguer.svg"></button>

</header>
<body id="body">

  <main         class="content">
    <div        id="calculator">

      <div      id="screen"><p></p></div>
      <div      id="buttons">

        <button class="buttons" id="aC">AC</button>
        <button class="buttons" id="aS">()</button>
        <button class="buttons">/</button>
        <button class="buttons">x</button>
        <button class="buttons">7</button>
        <button class="buttons">8</button>
        <button class="buttons">9</button>
        <button class="buttons">-</button>
        <button class="buttons">4</button>
        <button class="buttons">5</button>
        <button class="buttons">6</button>
        <button class="buttons">+</button>
        <button class="buttons">1</button>
        <button class="buttons">2</button>
        <button class="buttons">3</button>
        <button class="buttons" id="bEq">=</button>
        <button class="buttons">0</button>
        <button class="buttons">.</button>
        <button class="buttons" id="c">C</button>

    </div>
  </main>

  <div class="popup">
    
    <div class="popup-header">
      <div class="popup-header-title">
        <h2>Menu</h2>
      </div>
      <div class="popup-header-button">
        <button>x</button>
      </div>
    </div>

    <div class="popup-content">
      <button id="themeBtn">Change Colors</button>
    </div>

  </div>

  <script src="scripts/basicArithmetic.js"></script>
  <script src="scripts/buttonsCommands.js"></script>
  <script src="scripts/navigationMenus.js"></script>
  <script>

    if ('serviceWorker' in navigator) {
      
      const promise = navigator.serviceWorker.register('serviceWorker.js');

      promise.then((registration) => {
        console.log('Service Worker registered:', registration);
      });

      promise.catch((error) => {
        console.log('Service Worker error:', error);
      });
    
    };

  </script>

</body>
</html>
